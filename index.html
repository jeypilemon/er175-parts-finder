<!DOCTYPE html>

<html lang="en">



<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motorstar ER175 Parts Finder</title>
<link rel="stylesheet" href="style.css">


</head>

<body>    

    <body>

<!-- SAAS BAR (TOP HEADER) -->
<div id="supportBar" class="saas-bar">
    <div class="saas-left">
        <span class="dot"></span>
        <strong>Follow to support updates & new features</strong>
    </div>

    <div class="saas-right">
        <a class="btn yt" href="https://www.youtube.com/@jpxcariman" target="_blank">
            ▶ YouTube
        </a>

        <b class="btn tt" href="https://www.tiktok.com/@jpcariman" target="_blank">
            ♪ TikTok
        </b>

        <c class="btn fb" href="https://www.facebook.com/jeypixc" target="_blank">
            f Facebook
        </c>
    </div>
</div>

    <div id="linkModal" class="link-modal">
  <div class="link-modal-backdrop" onclick="closeModal()"></div>

  <div class="link-modal-content">
    <button class="close-modal" onclick="closeModal()">×</button>
    <iframe id="modalFrame"></iframe>
  </div>
</div>

    
    <h1>Motorstar ER175Fi Technical Hub</h1>

    <!-- TABS -->
    <div class="tabs">
    <button data-tab="manual" onclick="switchTab('manual')">Owner's Manual</button>
    <button data-tab="troubleshoot" onclick="switchTab('troubleshoot')">Troubleshooting Guides</button>
    <button data-tab="aftermarket" onclick="switchTab('aftermarket')">Aftermarket Parts</button>
    <button data-tab="oem" onclick="switchTab('oem')">Genuine Parts / Fairings</button>
</div>

    <!-- CHIPS -->
    <div class="chips" id="chips"></div>

    <!-- SEARCH -->
    <div class="search-box">
    <input id="search" placeholder="Search parts...">
    </div>

    <!-- RESET BUTTON -->
    <div class="reset-container">
    <button class="reset-btn" onclick="resetFilters()">
    ↺ Reset Filters</button>
    </div>

    <!-- PRODUCTS -->
    <div id="products"></div>

    <div id="suggestions"></div>

    <div class="container"></div>

    <footer class="footer">
    <div class="footer-title">Motorstar ER175 Technical Hub</div>

    <div class="footer-links">
        <a href="https://www.youtube.com/@jpxcariman" target="_blank">YouTube</a>
        <a href="https://www.tiktok.com/@jpcariman" target="_blank">TikTok</a>
        <a href="https://www.facebook.com/jeypixc" target="_blank">Facebook</a>
    </div>

    <div class="footer-note">
        Built for riders, mechanics, and DIY repair knowledge.
    </div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="app.js"></script>

<script src="https://unpkg.com/lucide@latest"></script>

</body>

</html>
